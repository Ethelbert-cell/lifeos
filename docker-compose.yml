services:
  app:
    build:
      context: .
      target: deps
    command: npm run dev
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/lifeos
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: lifeos
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:latest
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: lifeos_dev
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
