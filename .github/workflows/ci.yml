name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run Vitest unit tests
        run: npm run test -- --run

      - name: Build for production
        run: npm run build
        env:
          # Dummy values — build must succeed without real secrets
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/lifeos' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-dummy-secret-do-not-use' }}
          NEXTAUTH_URL: 'http://localhost:3000'
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'dummy-client-id' }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'dummy-client-secret' }}
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
